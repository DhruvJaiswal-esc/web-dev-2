        let cart=["laptop","mobile","earphone","adaptor"]
        function createOrder(cart){
            console.log("creating order")
            return new Promise((resolve,reject)=>{
                setTimeout(()=>{
                    if(cart.length>0)
                    {
                        resolve({
                            orderID:12345,
                            amount:50000

                        })
                    }
                    else{reject("cart is empty")

                    }
                },5000)


            })  }  
        
function makePayment(order){
    console.log("Initializing order")
    return new Promise((resolve,reject)=>{
        let network=true;
        setTimeout(()=>{
            if(network===true){
                resolve({...order,paymentID:"PAY1458"})
            }else{
                reject("payment failed")
            }
            }
     ,5000) })

    }

        function updateInventory(order){
            console.log("updating inventory...")
            return new Promise((resolve,reject)=>{
                let inventoryAvailable=true;
                setTimeout(()=>{
                    if(inventoryAvailable){
                    resolve({...order,inventoryStatus:true})
                    
                    }
                    else{
                        reject("inventory not available")

                    }
                },5000)
            })
        }
        function orderStatus(order){
        console.log("confirming order....")
        return new Promise((resolve,reject)=>{
            let message=true;
            setTimeout(()=>{
               if(message){
                resolve({
                    ...order,orderStatusKey:"confirmed"
                })
               }
               else{
                reject("order cancelled");
               }
            },5000)
        })
        }
